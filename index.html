r_ulen:{type:"noticket",tag:"No ticket — send unlock guidance to engagement",title:"Send enrollment unlock guidance via Slack",body:"Send the following guidance to the engagement IC so they can unlock the enrollment and have the EE resubmit. After the EE resubmits, allow 24–48 hours for a case to generate in Salesforce. Search the employee's name or group name in SFDC and check under the Cases section for the most recent case generations. If a case generated — no ticket needed, the NHE team will pick it up. If no case generated after 24–48 hours — come back and use the Change in Enrollment (closed MOps) path to create a ticket.",
tpl:[
{n:"Slack message to send to engagement IC",v:`You can unlock the enrollment by following this IKB: https://support.gusto.com/article/internal/220106115542547/Unlock-an-enrollment\n\nPlease leave this note in the Notes section in Hippo when unlocking:\nUnlocking enrollment due to _____. See case #__ for more info.\n\nPlease note: If the enrollment is already processed, you will first have to unprocess the subscription before unlocking the enrollment.\n\nReminder: Once they resubmit the changes, check if a case generates to make sure the proper selections are submitted to the NHE team's case queue to be processed/updated. If a case does not generate, you will need to create a NHE ticket.\n\nDon't hesitate to reach out if you have any questions or concerns!`,t:"fixed"}

let history=[];

function renderProg(d,t){
  const p=document.getElementById('prog');p.innerHTML='';
  for(let i=1;i<=t;i++){
    const el=document.createElement('div');
    el.className='pip'+(i<d?' done':i===d?' active':'');
    p.appendChild(el);
  }
}

function bc(parent){
  if(!history.length)return;
  const b=document.createElement('div');b.className='bc';
  history.forEach(h=>{
    const c=document.createElement('span');c.className='crumb';
    c.textContent=h.choice.length>48?h.choice.slice(0,46)+'…':h.choice;
    b.appendChild(c);
  });
  parent.appendChild(b);
}

function copyTpl(fields,btn){
  const lines=fields.map(f=>f.n+': '+(f.v||'[fill in]')).join('\n');
  navigator.clipboard.writeText(lines).then(()=>{
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy template text',2000);
  }).catch(()=>{
    btn.textContent='Select text above to copy';
  });
}

function render(id){
  const main=document.getElementById('main');main.innerHTML='';

  if(R[id]){
    const r=R[id];
    renderProg(5,5);
    const wrap=document.createElement('div');
    bc(wrap);
    const res=document.createElement('div');
    res.className='result '+r.type;

    let html=`<div class="rtag">${r.tag}</div><div class="rtitle">${r.title}</div><div class="rbody">${r.body}</div>`;
    res.innerHTML=html;

    if(r.pre){
      const ps=document.createElement('div');ps.className='presteps';
      ps.innerHTML=`<div class="presteps-lbl">${r.pre.lbl}</div><div class="presteps-body">${r.pre.body}</div>`;
      res.appendChild(ps);
    }

    if(r.tpl){
      const tog=document.createElement('button');tog.className='tpl-toggle';tog.textContent='Show template';
      const drawer=document.createElement('div');drawer.className='tpl-drawer';
      const lbl=document.createElement('div');lbl.className='tpl-lbl';lbl.textContent='Salesforce ticket template';
      drawer.appendChild(lbl);
      r.tpl.forEach(f=>{
        const fd=document.createElement('div');fd.className='field';
        const fn=document.createElement('div');fn.className='field-name';fn.textContent=f.n;
        const fv=document.createElement('div');
        fv.className='field-val'+(f.t==='fill'?' fill':f.t==='sel'?' sel':'');
        if(f.t==='fixed'&&f.v.startsWith('http')){fv.innerHTML=`<a href="${f.v}" target="_blank">${f.v}</a>`;}
        else{fv.textContent=f.v||'[fill in]';}
        fd.appendChild(fn);fd.appendChild(fv);
        drawer.appendChild(fd);
      });
      const cpbtn=document.createElement('button');cpbtn.className='copy-btn';cpbtn.textContent='Copy template text';
      cpbtn.onclick=()=>copyTpl(r.tpl,cpbtn);
      drawer.appendChild(cpbtn);
      tog.onclick=()=>{
        drawer.classList.toggle('open');
        tog.textContent=drawer.classList.contains('open')?'Hide template':'Show template';
      };
      res.appendChild(tog);
      res.appendChild(drawer);
    }

    if(r.note){
      const nb=document.createElement('div');nb.className='notebox';nb.textContent=r.note;
      res.appendChild(nb);
    }

    wrap.appendChild(res);
    const rb=document.createElement('button');rb.className='restart-btn';rb.textContent='Start over for a new situation';
    rb.onclick=()=>{history=[];render('start');};
    wrap.appendChild(rb);
    main.appendChild(wrap);
    return;
  }

  const node=N[id];if(!node)return;
  renderProg(node.d,node.t);
  const card=document.createElement('div');card.className='card';
  bc(card);
  const lbl=document.createElement('div');lbl.className='step-lbl';lbl.textContent=node.lbl;card.appendChild(lbl);
  const q=document.createElement('div');q.className='question';q.textContent=node.q;card.appendChild(q);
  const opts=document.createElement('div');opts.className='opts';
  node.opts.forEach(o=>{
    const btn=document.createElement('button');btn.className='opt';btn.textContent=o.txt;
    btn.onclick=()=>{history.push({from:id,choice:o.txt});render(o.nxt);};
    opts.appendChild(btn);
  });
  card.appendChild(opts);
  if(history.length){
    const bk=document.createElement('button');bk.className='back-btn';bk.textContent='← Go back';
    bk.onclick=()=>{const p=history.pop();render(p.from);};
    card.appendChild(bk);
  }
  main.appendChild(card);
}

render('start');
</script>
</body>
</html>
